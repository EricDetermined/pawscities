<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="pawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8863A"/>
      <stop offset="100%" style="stop-color:#D4722A"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#E8863A" stroke-width="3"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#E8863A" stroke-width="1" opacity="0.3"/>
  <!-- Paw pad (main) -->
  <ellipse cx="100" cy="115" rx="22" ry="18" fill="url(#pawGrad)"/>
  <!-- Toe beans -->
  <ellipse cx="75" cy="88" rx="11" ry="13" fill="url(#pawGrad)" transform="rotate(-15 75 88)"/>
  <ellipse cx="125" cy="88" rx="11" ry="13" fill="url(#pawGrad)" transform="rotate(15 125 88)"/>
  <ellipse cx="90" cy="78" rx="9" ry="12" fill="url(#pawGrad)" transform="rotate(-5 90 78)"/>
  <ellipse cx="110" cy="78" rx="9" ry="12" fill="url(#pawGrad)" transform="rotate(5 110 78)"/>
  <!-- Top text arc -->
  <path id="topArc" d="M 30,100 A 70,70 0 0,1 170,100" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#E8863A" letter-spacing="3">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">PAW CITIES</textPath>
  </text>
  <!-- Bottom text arc -->
  <path id="bottomArc" d="M 30,100 A 70,70 0 0,0 170,100" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#E8863A" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">AMBASSADOR</textPath>
  </text>
  <!-- Star accents -->
  <circle cx="35" cy="100" r="3" fill="#E8863A"/>
  <circle cx="165" cy="100" r="3" fill="#E8863A"/>
</svg>
