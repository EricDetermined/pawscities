<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Install Paw Cities Shortcut</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f9fafb; margin: 0; padding: 20px; text-align: center; }
    .card { max-width: 400px; margin: 60px auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 24px; margin: 16px 0 8px; }
    p { color: #6b7280; font-size: 15px; line-height: 1.5; }
    .icon { font-size: 64px; }
    .btn { display: inline-block; background: #f97316; color: white; padding: 14px 32px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 17px; margin-top: 20px; }
    .steps { text-align: left; margin-top: 24px; font-size: 14px; color: #374151; }
    .steps li { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🐾</div>
    <h1>Paw Cities Share</h1>
    <p>Install this shortcut to send Instagram posts to Paw Cities with two taps.</p>
    <a class="btn" href="/PawCities-Share.shortcut" download="PawCities-Share.shortcut">Download Shortcut</a>
    <div class="steps">
      <p><strong>After downloading:</strong></p>
      <ol>
        <li>Tap the downloaded file in Safari</li>
        <li>Tap <strong>"Add Shortcut"</strong></li>
        <li>In Instagram, tap <strong>Share → Paw Cities</strong></li>
      </ol>
    </div>
  </div>
</body>
</html>
