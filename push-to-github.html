const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');

function log(msg) {
  logEl.textContent += msg + '\n';
  console.log(msg);
}

async function apiCall(endpoint, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'Authorization': `token ${TOKEN}`,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github.v3+json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(`${API}${endpoint}`, opts);
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`API ${resp.status}: ${text.substring(0, 200)}`);
  }
  return resp.json();
}

async function pushToGitHub() {
  try {
    // 1. Get current HEAD
    statusEl.textContent = 'Getting HEAD commit...';
    const ref = await apiCall('/git/refs/heads/main');
    const headSha = ref.object.sha;
    log(`HEAD: ${headSha}`);

    const commit = await apiCall(`/git/commits/${headSha}`);
    const baseTreeSha = commit.tree.sha;
    log(`Base tree: ${baseTreeSha}`);

    // 2. Create blobs for all files
    statusEl.textContent = `Creating blobs for ${FILES.length} files...`;
    const treeEntries = [];
    
    for (let i = 0; i < FILES.length; i++) {
      const [path, content] = FILES[i];
      statusEl.textContent = `Creating blob ${i+1}/${FILES.length}: ${path}`;
      
      try {
        const blob = await apiCall('/git/blobs', 'POST', {
          content: content,
          encoding: 'base64'
        });
        treeEntries.push({
          path: path,
          mode: '100644',
          type: 'blob',
          sha: blob.sha
        });
        log(`OK [${i+1}/${FILES.length}]: ${path}`);
      } catch (e) {
        log(`ERR [${i+1}/${FILES.length}]: ${path} - ${e.message}`);
      }
    }

    // 3. Create tree
    statusEl.textContent = `Creating tree with ${treeEntries.length} entries...`;
    const tree = await apiCall('/git/trees', 'POST', {
      base_tree: baseTreeSha,
      tree: treeEntries
    });
    log(`Tree created: ${tree.sha}`);

    // 4. Create commit
    statusEl.textContent = 'Creating commit...';
    const newCommit = await apiCall('/git/commits', 'POST', {
      message: 'feat: Full multi-city app with 8 cities and 5000+ dog-friendly places\n\n- City pages with interactive map, search, category filters, favorites\n- Establishment detail pages with dog features, contact info\n- Data loader for all 8 cities from JSON research files\n- Updated cities-config, middleware, and Next.js config\n\nCo-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>',
      tree: tree.sha,
      parents: [headSha]
    });
    log(`Commit created: ${newCommit.sha}`);

    // 5. Update ref
    statusEl.textContent = 'Updating main branch...';
    const updatedRef = await apiCall('/git/refs/heads/main', 'PATCH', {
      sha: newCommit.sha,
      force: true
    });
    log(`Ref updated to: ${updatedRef.object.sha}`);

    statusEl.textContent = `SUCCESS! Pushed ${treeEntries.length} files to GitHub.`;
    statusEl.style.color = 'green';
    
    // Store result for reading
    window._pushResult = {
      success: true,
      commitSha: newCommit.sha,
      filesCount: treeEntries.length
    };
    
  } catch (e) {
    statusEl.textContent = `ERROR: ${e.message}`;
    statusEl.style.color = 'red';
    log(`FATAL: ${e.message}`);
    window._pushResult = { success: false, error: e.message };
  }
}

// Manual start - call window.startPush(token) to begin
window.startPush = function(token) {
  TOKEN = token;
  pushToGitHub();
};
statusEl.textContent = 'Ready. Waiting for token injection...';
</script>
